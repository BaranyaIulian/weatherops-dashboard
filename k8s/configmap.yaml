apiVersion: v1
kind: ConfigMap
metadata:
  name: weatherops-config
  namespace: weatherops
  labels:
    app: weatherops-dashboard
data:
  APP_NAME: "weatherops-dashboard"
  APP_VERSION: "1.0.0"
  PORT: "3000"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  MOCK_MODE: "true"
  WEATHER_API_URL: "https://api.openweathermap.org/data/2.5/weather"
  WEATHER_UNITS: "metric"
  CACHE_TTL_SECONDS: "300"