apiVersion: apps/v1
kind: Deployment
metadata:
  name: weatherops-dashboard
  namespace: weatherops
  labels:
    app: weatherops-dashboard
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: weatherops-dashboard

  template:
    metadata:
      labels:
        app: weatherops-dashboard
    spec:
      containers:
        - name: weatherops-dashboard
          image: weatherops-dashboard:local
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: weatherops-config
            - secretRef:
                name: weatherops-secret

          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"